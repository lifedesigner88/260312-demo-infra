name: demo-infra

services:
  caddy:
    image: ${CADDY_IMAGE}
    restart: unless-stopped
    depends_on:
      - vue
      - spring
      - rr7-fullstack
      - minio
    environment:
      VUE_SPRING_DOMAIN: ${VUE_SPRING_DOMAIN}
      VUE_PORT: ${VUE_PORT}
      SPRING_PORT: ${SPRING_PORT}
      MINIO_DOMAIN: ${MINIO_DOMAIN}
      RR7_FULLSTACK_DOMAIN: ${RR7_FULLSTACK_DOMAIN}
      RR7_FULLSTACK_PORT: ${RR7_FULLSTACK_PORT}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  vue:
    image: ${VUE_IMAGE}
    restart: unless-stopped

  spring:
    image: ${SPRING_IMAGE}
    restart: unless-stopped

  rr7-fullstack:
    image: ${RR7_FULLSTACK_IMAGE}
    restart: unless-stopped

  minio:
    image: ${MINIO_IMAGE}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL}
      MINIO_REGION: ${MINIO_REGION}
    volumes:
      - minio_data:/data

volumes:
  caddy_data:
  caddy_config:
  minio_data:
    external: true
    name: ${MINIO_DATA_VOLUME}
