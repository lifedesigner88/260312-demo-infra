name: team-310

services:
  frontend:
    image: ghcr.io/lifedesigner88/team-310-frontend:latest
    container_name: team-310-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT}:80"

  backend:
    image: ghcr.io/lifedesigner88/team-310-backend:latest
    container_name: team-310-backend
    restart: unless-stopped
    environment:
      DATABASE_URL:
      JWT_SECRET_KEY:
      BACKEND_CORS_ORIGINS:
      BACKEND_PORT:
      AUTH_COOKIE_NAME:
      AUTH_COOKIE_SAMESITE:
      AUTH_COOKIE_SECURE:
      JWT_EXPIRE_MINUTES:
      RESEND_API_KEY:
      RESEND_FROM:
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT}:${BACKEND_PORT}"

  ai-worker:
    image: ghcr.io/lifedesigner88/team-310-ai-worker:latest
    container_name: team-310-ai-worker
    restart: unless-stopped
    environment:
      DATABASE_URL:
      POLL_INTERVAL_SECONDS:
      USD_TO_KRW_RATE:
      ANTHROPIC_API_KEY:
      OPENAI_API_KEY:

networks:
  default:
    name: team-310_default
