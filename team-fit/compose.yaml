name: team-fit

services:
  frontend:
    image: ghcr.io/lifedesigner88/team-fit-frontend:dev
    container_name: team-fit-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT}:80"

  backend:
    image: ghcr.io/lifedesigner88/team-fit-backend:dev
    container_name: team-fit-backend
    restart: unless-stopped
    environment:
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-https://asm17.huposit.kr}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-none}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      RESEND_FROM: ${RESEND_FROM:-noreply@sejongclass.kr}
      DATABASE_URL:
      JWT_SECRET_KEY:
      JWT_EXPIRE_MINUTES:
      AUTH_COOKIE_NAME:
      ADMIN_SEED_PASSWORD:
      ADMIN_SEED_EMAIL:
      RESEND_API_KEY:
      ANTHROPIC_API_KEY:
      OPENAI_API_KEY:
      HUPOSITORY_ROOT:
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT}:${BACKEND_PORT:-8000}"

  ai-worker:
    image: ghcr.io/lifedesigner88/team-fit-ai-worker:dev
    container_name: team-fit-ai-worker
    restart: unless-stopped
    environment:
      DATABASE_URL:
      ANTHROPIC_API_KEY:
      OPENAI_API_KEY:
      HUPOSITORY_ROOT:

networks:
  default:
    name: team-fit_default
