name: Deploy persona-mirror

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - deploy-persona-mirror

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_BASE_DIR: ${{ vars.DEPLOY_BASE_DIR || '/opt/260312-demo-infra' }}
      PERSONA_MIRROR_DATABASE_URL: ${{ secrets.PERSONA_MIRROR_DATABASE_URL }}
      PERSONA_MIRROR_JWT_SECRET_KEY: ${{ secrets.PERSONA_MIRROR_JWT_SECRET_KEY }}
      PERSONA_MIRROR_ANTHROPIC_API_KEY: ${{ secrets.PERSONA_MIRROR_ANTHROPIC_API_KEY }}
      PERSONA_MIRROR_OPENAI_API_KEY: ${{ secrets.PERSONA_MIRROR_OPENAI_API_KEY }}
      PERSONA_MIRROR_RESEND_API_KEY: ${{ secrets.PERSONA_MIRROR_RESEND_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate SSH settings
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Prepare remote directory
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_BASE_DIR' '$DEPLOY_BASE_DIR/persona-mirror'"

      - name: Sync persona-mirror files
        run: |
          rsync -az --delete persona-mirror/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_BASE_DIR/persona-mirror/"

      - name: Write .env
        run: |
          {
            printf 'FRONTEND_HOST_PORT=3200\n'
            printf 'BACKEND_HOST_PORT=8200\n'
            printf 'DATABASE_URL=%s\n' "$PERSONA_MIRROR_DATABASE_URL"
            printf 'JWT_SECRET_KEY=%s\n' "$PERSONA_MIRROR_JWT_SECRET_KEY"
            printf 'ANTHROPIC_API_KEY=%s\n' "$PERSONA_MIRROR_ANTHROPIC_API_KEY"
            printf 'OPENAI_API_KEY=%s\n' "$PERSONA_MIRROR_OPENAI_API_KEY"
            printf 'RESEND_API_KEY=%s\n' "$PERSONA_MIRROR_RESEND_API_KEY"
          } > /tmp/persona-mirror.env
          scp /tmp/persona-mirror.env "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_BASE_DIR/persona-mirror/.env"

      - name: Deploy persona-mirror
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_BASE_DIR/persona-mirror' && docker compose pull && docker compose up -d"
