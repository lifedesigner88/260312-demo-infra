name: demo-caddy

services:
  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    restart: unless-stopped
    network_mode: host
    environment:
      VUE_SPRING_DOMAIN: ${VUE_SPRING_DOMAIN}
      VUE_SPRING_FRONTEND_HOST_PORT: ${VUE_SPRING_FRONTEND_HOST_PORT}
      RR7_FULLSTACK_DOMAIN: ${RR7_FULLSTACK_DOMAIN}
      RR7_FULLSTACK_HOST_PORT: ${RR7_FULLSTACK_HOST_PORT}
      PERSONA_MIRROR_DOMAIN: ${PERSONA_MIRROR_DOMAIN}
      PERSONA_MIRROR_FRONTEND_HOST_PORT: ${PERSONA_MIRROR_FRONTEND_HOST_PORT}
      PERSONA_MIRROR_BACKEND_HOST_PORT: ${PERSONA_MIRROR_BACKEND_HOST_PORT}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
